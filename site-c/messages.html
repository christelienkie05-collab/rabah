<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Messagerie directe Rabah — Échangez avec les musiciens et organisateurs de la communauté gospel.">
<meta name="theme-color" content="#C9A84C">
<title>Messages — Rabah</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C96A;--dark:#0D0D0D;--dark-2:#151515;--dark-3:#1E1E1E;--text:#F0EDE6;--muted:#8A8478;--border:rgba(201,168,76,0.18);--radius:12px;--success:#4caf7d;--safe-bottom:env(safe-area-inset-bottom,0px)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text)}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(13,13,13,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:60px}
.nav-logo{text-decoration:none;display:flex;align-items:center}.nav-logo img{height:36px;width:auto;mix-blend-mode:lighten}
.nav-links{display:flex;gap:24px}
.nav-links a{color:var(--muted);text-decoration:none;font-size:13px;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}
.nav-cta{background:var(--gold);color:var(--dark);padding:8px 18px;border-radius:6px;font-size:13px;font-weight:500;text-decoration:none}
.nav-hamburger{display:none;background:none;border:1px solid var(--border);color:var(--text);padding:7px 11px;border-radius:6px;font-size:16px;cursor:pointer}
@media(max-width:700px){.nav-links{display:none}.nav-hamburger{display:block}.nav-cta{display:none}}

/* LAYOUT */
.app{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 60px);margin-top:60px}
@media(max-width:768px){.app{grid-template-columns:1fr}.conv-panel{display:block}.chat-panel{display:none;position:fixed;inset:0;top:60px;z-index:50;background:var(--dark)}.chat-panel.mobile-open{display:flex}}

/* CONVERSATIONS LIST */
.conv-panel{border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--dark-2);overflow:hidden}
.conv-header{padding:18px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.conv-header h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400}
.conv-header-actions{display:flex;gap:8px}
.icon-btn{background:var(--dark-3);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .2s;flex-shrink:0}
.icon-btn:hover{border-color:var(--gold);color:var(--gold)}
.conv-search{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.conv-search input{width:100%;background:var(--dark-3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s}
.conv-search input:focus{border-color:var(--gold)}
.conv-search input::placeholder{color:var(--muted)}
.conv-list{overflow-y:auto;flex:1}
.conv-list::-webkit-scrollbar{width:4px}.conv-list::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.15);border-radius:2px}
.conv-item{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(201,168,76,0.07);position:relative}
.conv-item:hover,.conv-item.active{background:rgba(201,168,76,0.06)}
.conv-item.active{border-right:3px solid var(--gold)}
.conv-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative}
.conv-online{position:absolute;bottom:1px;right:1px;width:11px;height:11px;background:var(--success);border-radius:50%;border:2px solid var(--dark-2)}
.conv-body{flex:1;min-width:0}
.conv-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.conv-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.conv-name .v-badge{font-size:9px;background:rgba(76,175,125,0.15);color:var(--success);border:1px solid rgba(76,175,125,0.3);padding:1px 5px;border-radius:100px}
.conv-time{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.conv-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-unread{position:absolute;top:13px;right:12px;background:var(--gold);color:var(--dark);font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:100px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.conv-item.unread .conv-preview{color:var(--text);font-weight:500}

/* CHAT PANEL */
.chat-panel{display:flex;flex-direction:column;background:var(--dark);height:100%}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted)}
.chat-empty .ce-icon{font-size:56px;opacity:.4}
.chat-empty h3{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--text)}
.chat-empty p{font-size:14px;line-height:1.6;text-align:center;max-width:280px}

/* CHAT HEADER */
.chat-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:rgba(13,13,13,0.8);backdrop-filter:blur(8px);flex-shrink:0}
.chat-back{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;display:none;padding:4px}
@media(max-width:768px){.chat-back{display:block}}
.chat-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;position:relative}
.chat-online{position:absolute;bottom:0;right:0;width:10px;height:10px;background:var(--success);border-radius:50%;border:2px solid var(--dark)}
.chat-info{flex:1}
.chat-name{font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px}
.chat-status{font-size:11px;color:var(--muted)}
.chat-actions{display:flex;gap:6px}

/* MESSAGES AREA */
.msgs-area{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:6px}
.msgs-area::-webkit-scrollbar{width:4px}.msgs-area::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.15);border-radius:2px}

.date-sep{text-align:center;margin:12px 0 4px;font-size:11px;color:var(--muted);position:relative}
.date-sep::before,.date-sep::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:var(--border)}
.date-sep::before{left:0}.date-sep::after{right:0}

.msg-row{display:flex;gap:8px;max-width:78%;animation:msgIn .18s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg-row.me{align-self:flex-end;flex-direction:row-reverse}
.msg-row.them{align-self:flex-start}
.msg-av-sm{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;align-self:flex-end}
.msg-bubble{padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.5;position:relative;word-break:break-word}
.msg-row.me .msg-bubble{background:linear-gradient(135deg,#C9A84C,#a07830);color:#0D0D0D;border-bottom-right-radius:4px}
.msg-row.them .msg-bubble{background:var(--dark-3);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border)}
.msg-time{font-size:10px;opacity:.65;margin-top:4px;display:block;text-align:right}
.msg-row.them .msg-time{text-align:left}
.msg-read{font-size:10px;color:rgba(201,168,76,0.7);margin-left:3px}

/* TYPING INDICATOR */
.typing-indicator{display:flex;align-items:center;gap:5px;padding:9px 13px;background:var(--dark-3);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;width:fit-content;align-self:flex-start}
.typing-indicator span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:typDot 1.2s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes typDot{0%,80%,100%{transform:scale(1);opacity:.5}40%{transform:scale(1.15);opacity:1}}

/* INPUT BAR */
.input-bar{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:flex-end;gap:8px;background:var(--dark-2);padding-bottom:calc(10px + var(--safe-bottom));flex-shrink:0}
.input-bar textarea{flex:1;background:var(--dark-3);border:1px solid var(--border);border-radius:12px;padding:9px 14px;color:var(--text);font-size:13px;resize:none;outline:none;max-height:120px;min-height:40px;overflow-y:auto;transition:border-color .2s;font-family:'DM Sans',sans-serif;line-height:1.4}
.input-bar textarea:focus{border-color:rgba(201,168,76,0.5)}
.input-bar textarea::placeholder{color:var(--muted)}
.send-btn{width:40px;height:40px;border-radius:10px;background:var(--gold);border:none;color:var(--dark);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.send-btn:hover{background:var(--gold-light)}
.attach-btn{width:36px;height:36px;border-radius:8px;background:var(--dark-3);border:1px solid var(--border);color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.attach-btn:hover{border-color:var(--gold);color:var(--gold)}

/* NEW CONVO MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--dark-2);border:1px solid var(--border);border-radius:16px;max-width:440px;width:100%;overflow:hidden}
.modal-header{padding:22px 24px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
.modal-body{padding:18px 24px 24px;display:flex;flex-direction:column;gap:12px}
.modal-search input{width:100%;background:var(--dark-3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.modal-search input:focus{border-color:var(--gold)}
.contact-list{display:flex;flex-direction:column;gap:4px;max-height:280px;overflow-y:auto}
.contact-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .15s}
.contact-item:hover{background:rgba(201,168,76,0.08)}
.contact-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.contact-name{font-size:14px;font-weight:500}
.contact-role{font-size:11px;color:var(--muted)}

footer{display:none}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><img src="assets/logo.png" alt="Rabah"></a>
  <div class="nav-links">
    <a href="musiciens.html">Prestataires</a>
    <a href="evenements.html">Événements</a>
    <a href="messages.html" class="active">Messages</a>
    <a href="boutique.html">Boutique</a>
    <a href="communaute.html">Communauté</a>
  </div>
  <button class="nav-hamburger" onclick="toggleMobileMenu()">☰</button>
  <a href="communaute.html" class="nav-cta">Rejoindre</a>
</nav>

<div class="app">
  <!-- LISTE DES CONVERSATIONS -->
  <div class="conv-panel" id="conv-panel">
    <div class="conv-header">
      <h2>Messages</h2>
      <div class="conv-header-actions">
        <button class="icon-btn" onclick="openNewConvo()" title="Nouveau message">✏️</button>
        <button class="icon-btn" onclick="markAllRead()" title="Tout marquer lu">✓</button>
      </div>
    </div>
    <div class="conv-search">
      <input type="text" placeholder="Rechercher une conversation…" oninput="filterConvs(this.value)" id="conv-search-input">
    </div>
    <div class="conv-list" id="conv-list"></div>
  </div>

  <!-- ZONE DE CHAT -->
  <div class="chat-panel" id="chat-panel">
    <div class="chat-empty" id="chat-empty">
      <div class="ce-icon">💬</div>
      <h3>Vos messages</h3>
      <p>Sélectionnez une conversation ou démarrez un nouvel échange avec un musicien ou un organisateur.</p>
      <button onclick="openNewConvo()" style="background:var(--gold);color:var(--dark);border:none;padding:11px 24px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px">✏️ Nouveau message</button>
    </div>
    <div id="active-chat" style="display:none;flex-direction:column;height:100%">
      <div class="chat-header">
        <button class="chat-back" onclick="closeChat()">←</button>
        <div class="chat-av" id="chat-av"></div>
        <div class="chat-info">
          <div class="chat-name" id="chat-name"></div>
          <div class="chat-status" id="chat-status"></div>
        </div>
        <div class="chat-actions">
          <button class="icon-btn" id="chat-wa-btn" title="Continuer sur WhatsApp">📱</button>
          <button class="icon-btn" onclick="viewProfile()" title="Voir le profil">👤</button>
        </div>
      </div>
      <div class="msgs-area" id="msgs-area"></div>
      <div class="input-bar">
        <button class="attach-btn" onclick="attachFile()" title="Joindre">📎</button>
        <textarea id="msg-input" placeholder="Écrire un message…" rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
          oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL NOUVEAU MESSAGE -->
<div class="modal-overlay" id="new-convo-modal" onclick="if(event.target===this)closeNewConvo()">
  <div class="modal">
    <div class="modal-header">
      <h3>Nouveau message</h3>
      <button class="modal-close" onclick="closeNewConvo()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-search">
        <input type="text" placeholder="Chercher un musicien ou organisateur…" oninput="filterContacts(this.value)" id="contact-search">
      </div>
      <div class="contact-list" id="contact-list"></div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// DONNÉES MOCK (remplacer par API quand DB active)
// ─────────────────────────────────────────────
const USERS = [
  {id:1,  name:'Samuel K.',    role:'Pianiste gospel · Paris',      avatar:'🎹', color:'linear-gradient(135deg,#C9A84C,#8B5E28)', online:true,  verified:true},
  {id:2,  name:'Grace M.',     role:'Chanteuse gospel · Lyon',       avatar:'🎤', color:'linear-gradient(135deg,#4caf7d,#2d7a56)', online:false, verified:true},
  {id:3,  name:'Miriam T.',    role:'Danseuse prophétique · Paris',  avatar:'💃', color:'linear-gradient(135deg,#8899ee,#4455aa)', online:true,  verified:false},
  {id:4,  name:'Nathan B.',    role:'Guitariste · Marseille',        avatar:'🎸', color:'linear-gradient(135deg,#e05555,#a03333)', online:false, verified:true},
  {id:5,  name:'Esther N.',    role:'Violoniste · Versailles',       avatar:'🎻', color:'linear-gradient(135deg,#C9A84C,#5a3e1b)', online:true,  verified:true},
  {id:6,  name:'Ezra K.',      role:'DJ Gospel · Strasbourg',        avatar:'🎧', color:'linear-gradient(135deg,#e05555,#a03333)', online:false, verified:false},
  {id:7,  name:'Christelle M.','role':'Organisatrice · Paris',       avatar:'👰', color:'linear-gradient(135deg,#ff9eb5,#c06080)', online:true,  verified:false},
  {id:8,  name:'Pasteur David','role':'Responsable louange · Lyon',  avatar:'⛪', color:'linear-gradient(135deg,#8899ee,#4455aa)', online:false, verified:true},
];

// Conversations avec messages mock
let CONVOS = [
  {
    id:1, userId:1, unread:2,
    messages:[
      {from:'them', text:'Bonjour ! J\'ai vu votre annonce pour le mariage du 15 juin — je suis disponible et très intéressé.', time:'10:24'},
      {from:'them', text:'Voici un lien vers ma dernière prestation en mariage : youtu.be/example', time:'10:25'},
      {from:'me',   text:'Bonjour Samuel ! Merci pour votre réponse rapide. J\'ai regardé votre profil vidéo, c\'est exactement ce que je cherche.', time:'11:02'},
      {from:'me',   text:'Pouvez-vous me confirmer votre disponibilité le 14 juin pour une répétition ?', time:'11:03'},
      {from:'them', text:'Oui, le 14 juin me convient parfaitement. Quel créneau horaire ?', time:'11:45'},
      {from:'them', text:'Je suis libre à partir de 14h 🎹', time:'11:46'},
    ]
  },
  {
    id:2, userId:2, unread:0,
    messages:[
      {from:'me',   text:'Bonjour Grace, je vous contacte suite à votre profil sur Rabah.', time:'Hier'},
      {from:'them', text:'Bonjour ! Avec plaisir, dites-moi en quoi consiste l\'événement ?', time:'Hier'},
      {from:'me',   text:'C\'est un culte de louange pour environ 300 personnes, fin août à Lyon.', time:'Hier'},
      {from:'them', text:'Super, ça m\'intéresse ! Quel est le budget prévu ?', time:'Hier'},
    ]
  },
  {
    id:3, userId:7, unread:1,
    messages:[
      {from:'them', text:'Bonjour, j\'ai utilisé le service conciergerie et je voulais vous remercier — le groupe était fantastique pour notre mariage !', time:'Lun.'},
      {from:'them', text:'Nous recommanderons Rabah à tout notre entourage 🙏', time:'Lun.'},
      {from:'me',   text:'Merci beaucoup Christelle, c\'est une joie de lire votre retour ! Félicitations pour votre mariage 💍', time:'Lun.'},
    ]
  },
  {
    id:4, userId:8, unread:0,
    messages:[
      {from:'them', text:'Bonjour, nous cherchons un groupe complet pour notre gala annuel en novembre. Budget 800€.', time:'Sam.'},
      {from:'me',   text:'Bonjour Pasteur David ! Je vous propose notre formule Excellence — je vous envoie le détail.', time:'Sam.'},
      {from:'them', text:'Parfait, j\'attends votre proposition.', time:'Sam.'},
    ]
  },
  {
    id:5, userId:4, unread:0,
    messages:[
      {from:'me',   text:'Bonjour Nathan, votre profil est excellent. Seriez-vous disponible pour une mission à Marseille en octobre ?', time:'Ven.'},
      {from:'them', text:'Bonjour ! Oui, je suis disponible en octobre. Pouvez-vous me donner plus de détails ?', time:'Ven.'},
    ]
  },
];

let activeConvoId = null;
let typingTimeout = null;
const ME = {name:'Vous', avatar:'😊'};

// ── RENDER CONVERSATIONS ──────────────────────
function renderConvList(convos) {
  const list = document.getElementById('conv-list');
  list.innerHTML = convos.map(c => {
    const u = USERS.find(u => u.id === c.userId);
    const last = c.messages[c.messages.length - 1];
    return `
    <div class="conv-item ${c.unread ? 'unread' : ''} ${activeConvoId === c.id ? 'active' : ''}" onclick="openConvo(${c.id})">
      <div class="conv-avatar" style="background:${u.color}">
        ${u.avatar}
        ${u.online ? '<div class="conv-online"></div>' : ''}
      </div>
      <div class="conv-body">
        <div class="conv-top">
          <div class="conv-name">${u.name} ${u.verified ? '<span class="v-badge">✓</span>' : ''}</div>
          <div class="conv-time">${last.time}</div>
        </div>
        <div class="conv-preview">${last.from === 'me' ? 'Vous : ' : ''}${last.text}</div>
      </div>
      ${c.unread ? `<div class="conv-unread">${c.unread}</div>` : ''}
    </div>`;
  }).join('');
}

function filterConvs(q) {
  const filtered = CONVOS.filter(c => {
    const u = USERS.find(u => u.id === c.userId);
    return u.name.toLowerCase().includes(q.toLowerCase());
  });
  renderConvList(filtered);
}

// ── OPEN CONVERSATION ─────────────────────────
function openConvo(id) {
  activeConvoId = id;
  const c = CONVOS.find(c => c.id === id);
  const u = USERS.find(u => u.id === c.userId);
  c.unread = 0;
  renderConvList(CONVOS);

  // Header
  document.getElementById('chat-av').innerHTML = `<div style="width:38px;height:38px;border-radius:50%;background:${u.color};display:flex;align-items:center;justify-content:center;font-size:18px">${u.avatar}${u.online ? '<div class="chat-online"></div>' : ''}</div>`;
  document.getElementById('chat-name').innerHTML = `${u.name} ${u.verified ? '<span style="font-size:10px;background:rgba(76,175,125,0.15);color:#4caf7d;border:1px solid rgba(76,175,125,0.3);padding:1px 6px;border-radius:100px">✓ Vérifié</span>' : ''}`;
  document.getElementById('chat-status').textContent = u.online ? '🟢 En ligne maintenant' : `${u.role}`;
  document.getElementById('chat-wa-btn').onclick = () => {
    const msg = encodeURIComponent(`Bonjour ${u.name}, je vous contacte depuis Rabah`);
    window.open(`https://wa.me/33651426961?text=${msg}`, '_blank');
  };

  // Render messages
  renderMessages(c.messages, u);

  // Show chat
  document.getElementById('chat-empty').style.display = 'none';
  const ac = document.getElementById('active-chat');
  ac.style.display = 'flex';

  // Mobile: show chat panel
  if (window.innerWidth <= 768) {
    document.getElementById('chat-panel').classList.add('mobile-open');
  }

  document.getElementById('msg-input').focus();
}

function renderMessages(msgs, u) {
  const area = document.getElementById('msgs-area');
  let lastDate = '';
  area.innerHTML = msgs.map((m, i) => {
    let html = '';
    if (m.time !== lastDate && ['Hier','Lun.','Mar.','Mer.','Jeu.','Ven.','Sam.'].includes(m.time)) {
      html += `<div class="date-sep">${m.time}</div>`;
      lastDate = m.time;
    }
    const isMe = m.from === 'me';
    html += `
    <div class="msg-row ${isMe ? 'me' : 'them'}">
      ${!isMe ? `<div class="msg-av-sm" style="background:${u.color}">${u.avatar}</div>` : ''}
      <div>
        <div class="msg-bubble">${m.text.replace(/\n/g,'<br>')}
          <span class="msg-time">${m.time}${isMe ? ' <span class="msg-read">✓✓</span>' : ''}</span>
        </div>
      </div>
    </div>`;
    return html;
  }).join('');
  area.scrollTop = area.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !activeConvoId) return;
  input.value = '';
  input.style.height = '';

  const c = CONVOS.find(c => c.id === activeConvoId);
  const u = USERS.find(u => u.id === c.userId);
  const now = new Date();
  const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

  c.messages.push({from:'me', text, time});
  renderMessages(c.messages, u);
  renderConvList(CONVOS);

  // Simulate reply after 1.5–3s
  clearTimeout(typingTimeout);
  showTyping();
  typingTimeout = setTimeout(() => {
    hideTyping();
    const replies = [
      'Très bien, je prends note !',
      'Merci pour votre message. Je reviens vers vous rapidement.',
      'Parfait, nous sommes sur la même longueur d\'onde 🙏',
      'Je vous contacte demain matin pour confirmer les détails.',
      'C\'est noté ! Bénédiction sur vous.',
    ];
    const reply = replies[Math.floor(Math.random() * replies.length)];
    c.messages.push({from:'them', text:reply, time});
    renderMessages(c.messages, u);
    renderConvList(CONVOS);
  }, 1500 + Math.random() * 1500);
}

let typingEl = null;
function showTyping() {
  const area = document.getElementById('msgs-area');
  typingEl = document.createElement('div');
  typingEl.className = 'typing-indicator';
  typingEl.id = 'typing-el';
  typingEl.innerHTML = '<span></span><span></span><span></span>';
  area.appendChild(typingEl);
  area.scrollTop = area.scrollHeight;
}
function hideTyping() {
  const el = document.getElementById('typing-el');
  if (el) el.remove();
}

function closeChat() {
  document.getElementById('chat-panel').classList.remove('mobile-open');
  activeConvoId = null;
}

function autoResize(el) {
  el.style.height = '';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── NEW CONVERSATION MODAL ────────────────────
function openNewConvo() {
  renderContactList(USERS);
  document.getElementById('new-convo-modal').classList.add('open');
  document.getElementById('contact-search').focus();
}
function closeNewConvo() {
  document.getElementById('new-convo-modal').classList.remove('open');
}
function renderContactList(users) {
  document.getElementById('contact-list').innerHTML = users.map(u => `
    <div class="contact-item" onclick="startConvo(${u.id})">
      <div class="contact-av" style="background:${u.color}">${u.avatar}</div>
      <div>
        <div class="contact-name">${u.name} ${u.verified ? '✓' : ''}</div>
        <div class="contact-role">${u.role}</div>
      </div>
    </div>`).join('');
}
function filterContacts(q) {
  renderContactList(USERS.filter(u => u.name.toLowerCase().includes(q.toLowerCase()) || u.role.toLowerCase().includes(q.toLowerCase())));
}
function startConvo(userId) {
  closeNewConvo();
  const existing = CONVOS.find(c => c.userId === userId);
  if (existing) { openConvo(existing.id); return; }
  const newId = Math.max(...CONVOS.map(c => c.id)) + 1;
  const u = USERS.find(u => u.id === userId);
  CONVOS.unshift({id:newId, userId, unread:0, messages:[
    {from:'them', text:`Bonjour ! Je suis ${u.name}. Comment puis-je vous aider ?`, time: new Date().getHours() + ':' + String(new Date().getMinutes()).padStart(2,'0')}
  ]});
  renderConvList(CONVOS);
  openConvo(newId);
}

function markAllRead() {
  CONVOS.forEach(c => c.unread = 0);
  renderConvList(CONVOS);
}

function viewProfile() {
  if (!activeConvoId) return;
  const c = CONVOS.find(c => c.id === activeConvoId);
  window.location.href = 'musiciens.html';
}

function attachFile() {
  const msg = encodeURIComponent('Bonjour, je veux partager un fichier via Rabah');
  window.open('https://wa.me/33651426961?text=' + msg, '_blank');
}

  // simple redirect for messages page
}

renderConvList(CONVOS);
</script>
