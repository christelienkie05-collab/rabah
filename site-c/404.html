<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0D0D0D; --gold: #C9A84C; --gold-l: #E2C97E;
    --text: #F0EDE6; --text-dim: #A09880;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--sans); min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none; margin-bottom: 3rem;
  }
  .logo span {
    font-family: var(--serif); font-size: 1.4rem;
    letter-spacing: .18em; color: var(--gold); font-weight: 600;
  }
  .code {
    font-family: var(--serif); font-size: clamp(5rem, 20vw, 10rem);
    font-weight: 300; color: var(--gold); line-height: 1;
    opacity: .15; position: absolute;
    pointer-events: none; user-select: none;
  }
  .content { position: relative; z-index: 1; }
  h1 {
    font-family: var(--serif); font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 400; margin-bottom: 1rem; line-height: 1.2;
  }
  h1 em { color: var(--gold); font-style: italic; }
  p { color: var(--text-dim); font-size: .95rem; max-width: 380px; line-height: 1.7; margin: 0 auto 2.5rem; }
  .btn {
    display: inline-flex; align-items: center; gap: .5rem;
    padding: .75rem 1.75rem; border-radius: 50px;
    background: linear-gradient(135deg, var(--gold), #8A6E2F);
    color: #0D0D0D; font-weight: 600; font-size: .9rem;
    text-decoration: none; transition: opacity .2s;
  }
  .btn:hover { opacity: .85; }
  .links { margin-top: 2rem; display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
  .links a { color: var(--text-dim); font-size: .85rem; text-decoration: none; }
  .links a:hover { color: var(--gold); }
</style>
</head>
